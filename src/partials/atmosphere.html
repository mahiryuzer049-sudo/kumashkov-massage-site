<!-- ATMOSPHERE -->
<section id="atmosphere" class="section-shell bg-[#030303] overflow-hidden" data-motion-profile="calm" data-atmosphere data-choreo-section>
  <div class="filmic-overlay" data-exp-media="filmic" style="--filmic-intensity: 0.5;"></div>
  <div class="atmosphere-overlays" aria-hidden="true">
    <span class="atmosphere-layer atmosphere-layer--grain"></span>
    <span class="atmosphere-layer atmosphere-layer--leak"></span>
    <span class="atmosphere-layer atmosphere-layer--vignette"></span>
  </div>
  <div class="max-w-screen-xl mx-auto px-6 editorial-grid editorial-grid--a">
    <div class="section-head reveal-on-scroll mb-12">
      <p class="section-kicker">Atmosphere</p>
      <h2 class="section-title">Атмосфера <span class="italic text-gray-500">Сеанса</span></h2>
      <p class="section-subtitle">
        Пространство и детали, которые создают ощущение спокойствия, чистоты и личного комфорта.
      </p>
    </div>

    <div class="grid md:grid-cols-3 gap-6">
      <article class="gallery-card reveal-on-scroll group">
        <div class="relative aspect-[4/5] overflow-hidden shape-clip shape-reveal shape-clip-wave">
                    <picture>
            <source type="image/avif" srcset="/assets/images/space/space-04.avif">
            <source type="image/webp" srcset="/assets/images/space/space-04.webp">
            <img src="/assets/images/space/space-04.jpg" class="w-full h-full object-cover noir-filter group-hover:scale-105 transition-transform duration-700" loading="lazy" decoding="async" alt="Теплая подготовка пространства">
          </picture>
          <div class="absolute inset-x-0 bottom-0 p-4 bg-gradient-to-t from-black/80 to-transparent">
            <p class="text-champagne font-serif text-2xl italic">Комфорт</p>
            <p class="text-[11px] uppercase tracking-widest text-white/60">Чисто, спокойно, без спешки</p>
          </div>
        </div>
      </article>

      <article class="gallery-card reveal-on-scroll group" style="transition-delay: 0.08s;">
        <div class="relative aspect-[4/5] overflow-hidden shape-clip shape-reveal shape-clip-swoop">
                    <picture>
            <source type="image/avif" srcset="/assets/images/space/space-05.avif">
            <source type="image/webp" srcset="/assets/images/space/space-05.webp">
            <img src="/assets/images/space/space-05.jpg" class="w-full h-full object-cover noir-filter group-hover:scale-105 transition-transform duration-700" loading="lazy" decoding="async" alt="Тактильная работа и ритм">
          </picture>
          <div class="absolute inset-x-0 bottom-0 p-4 bg-gradient-to-t from-black/80 to-transparent">
            <p class="text-champagne font-serif text-2xl italic">Ритм</p>
            <p class="text-[11px] uppercase tracking-widest text-white/60">Темп под ваш запрос</p>
          </div>
        </div>
      </article>

      <article class="gallery-card reveal-on-scroll group" style="transition-delay: 0.16s;">
        <div class="relative aspect-[4/5] overflow-hidden shape-clip shape-reveal shape-clip-ellipse">
                    <picture>
            <source type="image/avif" srcset="/assets/images/space/space-06.avif">
            <source type="image/webp" srcset="/assets/images/space/space-06.webp">
            <img src="/assets/images/space/space-06.jpg" class="w-full h-full object-cover noir-filter group-hover:scale-105 transition-transform duration-700" loading="lazy" decoding="async" alt="Материалы и премиальные детали">
          </picture>
          <div class="absolute inset-x-0 bottom-0 p-4 bg-gradient-to-t from-black/80 to-transparent">
            <p class="text-champagne font-serif text-2xl italic">Детали</p>
            <p class="text-[11px] uppercase tracking-widest text-white/60">Материалы и уход</p>
          </div>
        </div>
      </article>
    </div>
  </div>
</section>
